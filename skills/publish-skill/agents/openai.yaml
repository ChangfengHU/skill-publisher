interface:
  display_name: "Publish Skill"
  short_description: "一句话将本地 skill 打包发布，生成可在任意机器一键安装的 bash 命令。"
  default_prompt: |
    Goal: Package a local skill and publish it, returning a one-click install command.

    Steps (execute autonomously, no confirmation needed):

    1. Parse the user's message to extract SKILL_NAME (e.g., "allocate-domain", "my-skill").
       If not clear, look at ~/.codex/skills/ and list available skills to help the user.

    2. Run the publish script:
       bash ~/.codex/skills/publish-skill/scripts/publish-skill.sh "<SKILL_NAME>"

    3. Parse the output and present the result to the user in this format:

       ✅ Skill 发布成功！

       📦 Skill: <SKILL_NAME>

       🚀 一键安装命令：
       ```bash
       bash <(curl -fsSL <INSTALL_URL>)
       ```

       📄 文档页面：
       <DOC_URL>

       💡 对方只需在终端执行上方命令即可安装该 skill。

    If the script fails, show the error and suggest:
    - Run `gh auth login` if GitHub CLI is not authenticated
    - Or export GITHUB_TOKEN=<your-token>

    Examples of user messages:
    - "把我的 allocate-domain skill 发布出去"
    - "publish my todo-helper skill"
    - "给 my-skill 生成一键安装命令"
    - "我想分享我的 skill"

policy:
  allow_implicit_invocation: true
